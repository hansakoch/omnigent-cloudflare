<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnigent Cloud</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid #222;
    }
    h1 { font-size: 24px; color: #fff; }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #333; color: white; }
    .btn-secondary:hover { background: #444; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-danger:hover { background: #dc2626; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 20px;
    }
    .card h2 { font-size: 16px; margin-bottom: 12px; color: #888; }
    .card ul { list-style: none; }
    .card li {
      padding: 8px 0;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card li:last-child { border-bottom: none; }

    .status { padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    .status-online { background: #065f46; color: #6ee7b7; }
    .status-offline { background: #7f1d1d; color: #fca5a5; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 14px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }

    .chat { margin-top: 20px; }
    .messages {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 16px;
      height: 400px;
      overflow-y: auto;
    }
    .message {
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 6px;
      max-width: 80%;
    }
    .message-user { background: #1e3a5f; margin-left: auto; }
    .message-assistant { background: #1a1a1a; }
    .input-row { display: flex; gap: 8px; margin-top: 12px; }
    .input-row input { flex: 1; }

    .empty { color: #666; text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Omnigent Cloud</h1>
      <div>
        <button class="btn btn-secondary" onclick="refresh()">Refresh</button>
        <button class="btn btn-primary" onclick="showNewSession()">New Session</button>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <h2>Sessions</h2>
        <ul id="sessions-list">
          <li class="empty">No sessions yet</li>
        </ul>
      </div>

      <div class="card">
        <h2>Hosts</h2>
        <ul id="hosts-list">
          <li class="empty">No hosts connected</li>
        </ul>
      </div>
    </div>

    <div class="chat" id="chat-section" style="display: none;">
      <div class="card">
        <h2 id="chat-title">Session</h2>
        <div class="messages" id="messages"></div>
        <div class="input-row">
          <input type="text" id="message-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- New Session Modal -->
  <div class="modal" id="new-session-modal">
    <div class="modal-content">
      <h2 style="margin-bottom: 16px;">New Session</h2>
      <div class="form-group">
        <label>Agent</label>
        <select id="agent-select"></select>
      </div>
      <div class="form-group">
        <label>Title (optional)</label>
        <input type="text" id="session-title" placeholder="My session">
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createSession()">Create</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let currentSession = null;

    async function api(path, opts = {}) {
      const res = await fetch(`${API}${path}`, {
        headers: { 
          'Content-Type': 'application/json',
          ...opts.headers 
        },
        ...opts,
      });
      return res.json();
    }

    async function refresh() {
      const [sessions, hosts, agents] = await Promise.all([
        api('/v1/sessions'),
        api('/v1/hosts'),
        api('/v1/agents'),
      ]);

      renderSessions(sessions);
      renderHosts(hosts);
      renderAgentOptions(agents);
    }

    function renderSessions(sessions) {
      const el = document.getElementById('sessions-list');
      if (!sessions.length) {
        el.innerHTML = '<li class="empty">No sessions yet</li>';
        return;
      }
      el.innerHTML = sessions.map(s => `
        <li onclick="openSession('${s.id}')" style="cursor: pointer;">
          <span>${s.title || s.id}</span>
          <span class="status ${s.status === 'active' ? 'status-online' : 'status-offline'}">${s.status}</span>
        </li>
      `).join('');
    }

    function renderHosts(hosts) {
      const el = document.getElementById('hosts-list');
      if (!hosts.length) {
        el.innerHTML = '<li class="empty">No hosts connected</li>';
        return;
      }
      el.innerHTML = hosts.map(h => `
        <li>
          <span>${h.name || h.id}</span>
          <span class="status ${h.status === 'online' ? 'status-online' : 'status-offline'}">${h.status}</span>
        </li>
      `).join('');
    }

    function renderAgentOptions(agents) {
      const el = document.getElementById('agent-select');
      el.innerHTML = agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }

    function showNewSession() {
      document.getElementById('new-session-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('new-session-modal').classList.remove('active');
    }

    async function createSession() {
      const agentId = document.getElementById('agent-select').value;
      const title = document.getElementById('session-title').value;

      const session = await api('/v1/sessions', {
        method: 'POST',
        body: JSON.stringify({ agent_id: agentId, title }),
      });

      closeModal();
      currentSession = session;
      openSession(session.id);
      refresh();
    }

    async function openSession(id) {
      currentSession = await api(`/v1/sessions/${id}`);
      document.getElementById('chat-section').style.display = 'block';
      document.getElementById('chat-title').textContent = currentSession.title || currentSession.id;

      const messages = await api(`/v1/sessions/${id}/messages`);
      renderMessages(messages);
    }

    function renderMessages(messages) {
      const el = document.getElementById('messages');
      if (!messages.length) {
        el.innerHTML = '<div class="empty">No messages yet</div>';
        return;
      }
      el.innerHTML = messages.map(m => `
        <div class="message message-${m.role}">${escapeHtml(m.content)}</div>
      `).join('');
      el.scrollTop = el.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      if (!content || !currentSession) return;

      input.value = '';

      await api(`/v1/sessions/${currentSession.id}/messages`, {
        method: 'POST',
        body: JSON.stringify({ content, role: 'user' }),
      });

      const messages = await api(`/v1/sessions/${currentSession.id}/messages`);
      renderMessages(messages);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Initial load
    refresh();
  </script>
</body>
</html>
