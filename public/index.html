<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnigent Cloud</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #222;
      margin-bottom: 20px;
    }
    h1 { font-size: 20px; color: #fff; }
    .header-actions { display: flex; gap: 8px; }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #333; color: white; }
    .btn-secondary:hover { background: #444; }
    .btn-success { background: #059669; color: white; }
    .btn-success:hover { background: #047857; }

    .layout { display: grid; grid-template-columns: 280px 1fr 280px; gap: 16px; height: calc(100vh - 100px); }
    @media (max-width: 1024px) { .layout { grid-template-columns: 1fr; height: auto; } }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .session-item, .runner-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.1s;
    }
    .session-item:hover, .runner-item:hover { background: #1a1a1a; }
    .session-item.active { background: #1e3a5f; }
    .session-title { font-size: 14px; margin-bottom: 2px; }
    .session-meta { font-size: 11px; color: #666; display: flex; gap: 8px; }
    .runner-name { font-size: 13px; margin-bottom: 2px; }
    .runner-harnesses { font-size: 11px; color: #666; }

    .chat-panel { display: flex; flex-direction: column; }
    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 { font-size: 15px; }
    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }
    .message {
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 8px;
      max-width: 80%;
      line-height: 1.5;
      font-size: 14px;
    }
    .message-user { background: #1e3a5f; margin-left: auto; }
    .message-assistant { background: #1a1a1a; border: 1px solid #222; }
    .message-system { background: #1a1a2e; border: 1px solid #333; font-size: 12px; color: #888; text-align: center; }
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #222;
    }
    .chat-input input { flex: 1; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-online { background: #22c55e; }
    .status-offline { background: #ef4444; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 13px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }

    .empty { color: #666; text-align: center; padding: 40px 20px; font-size: 13px; }
    .empty-icon { font-size: 32px; margin-bottom: 8px; opacity: 0.5; }

    input[type="text"], input[type="password"] {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 12px;
      color: white;
      font-size: 14px;
    }
    input:focus { outline: none; border-color: #3b82f6; }

    .agent-badge {
      font-size: 10px;
      padding: 2px 6px;
      background: #222;
      border-radius: 4px;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Omnigent Cloud</h1>
      <div class="header-actions">
        <button class="btn btn-secondary" onclick="refresh()">Refresh</button>
        <button class="btn btn-primary" onclick="showNewSession()">New Session</button>
      </div>
    </header>

    <div class="layout">
      <!-- Sessions Panel -->
      <div class="panel">
        <div class="panel-header">
          <span>Sessions</span>
          <span id="session-count">0</span>
        </div>
        <div class="panel-content" id="sessions-list">
          <div class="empty">No sessions yet</div>
        </div>
      </div>

      <!-- Chat Panel -->
      <div class="panel chat-panel">
        <div class="chat-header" id="chat-header" style="display: none;">
          <div>
            <h2 id="chat-title">Session</h2>
            <span class="agent-badge" id="chat-agent"></span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px;">
            <select id="assign-runner-select" onchange="assignRunner(this.value)" style="background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 4px 8px; color: white; font-size: 12px;">
              <option value="">No runner</option>
            </select>
            <span class="status-dot" id="runner-dot"></span>
          </div>
        </div>
        <div class="chat-messages" id="messages">
          <div class="empty">
            <div class="empty-icon">&#128172;</div>
            Select a session to start chatting
          </div>
        </div>
        <div class="chat-input" id="chat-input" style="display: none;">
          <input type="text" id="message-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>

      <!-- Runners Panel -->
      <div class="panel">
        <div class="panel-header">
          <span>Runners</span>
          <span id="runner-count">0</span>
        </div>
        <div class="panel-content" id="runners-list">
          <div class="empty">No runners connected</div>
        </div>
      </div>
    </div>
  </div>

  <!-- New Session Modal -->
  <div class="modal" id="new-session-modal">
    <div class="modal-content">
      <h2 style="margin-bottom: 16px; font-size: 16px;">New Session</h2>
      <div class="form-group">
        <label>Agent</label>
        <select id="agent-select"></select>
      </div>
      <div class="form-group">
        <label>Title (optional)</label>
        <input type="text" id="session-title" placeholder="My session">
      </div>
      <div class="form-group">
        <label>Assign Runner (optional)</label>
        <select id="runner-select">
          <option value="">None (auto-assign)</option>
        </select>
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createSession()">Create</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let currentSession = null;
    let sessions = [];
    let agents = [];
    let runners = [];

    async function api(path, opts = {}) {
      const res = await fetch(`${API}${path}`, {
        headers: { 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      return res.json();
    }

    async function refresh() {
      [sessions, agents, runners] = await Promise.all([
        api('/v1/sessions'),
        api('/v1/agents'),
        api('/v1/runners'),
      ]);
      renderSessions();
      renderRunners();
      renderAgentOptions();
      renderRunnerOptions();
    }

    function renderSessions() {
      const el = document.getElementById('sessions-list');
      document.getElementById('session-count').textContent = sessions.length;
      
      if (!sessions.length) {
        el.innerHTML = '<div class="empty">No sessions yet</div>';
        return;
      }
      
      el.innerHTML = sessions.map(s => `
        <div class="session-item ${currentSession?.id === s.id ? 'active' : ''}" data-id="${s.id}" onclick="openSession(this.dataset.id)">
          <div class="session-title">${s.title || s.id}</div>
          <div class="session-meta">
            <span>${s.agent_name || s.agent_id}</span>
            <span>${s.runner_id ? '⚡ runner' : '⏳ queued'}</span>
          </div>
        </div>
      `).join('');
    }

    function renderRunners() {
      const el = document.getElementById('runners-list');
      document.getElementById('runner-count').textContent = runners.length;
      
      if (!runners.length) {
        el.innerHTML = '<div class="empty">No runners connected<br><br>Connect a runner:<br><code style="font-size:11px; color:#666;">omnigent host --server ' + window.location.origin + '</code></div>';
        return;
      }
      
      el.innerHTML = runners.map(r => `
        <div class="runner-item">
          <div class="runner-name">
            <span class="status-dot status-online"></span>
            ${r.runner_id}
          </div>
          <div class="runner-harnesses">
            ${(r.harnesses || []).join(', ') || 'unknown'}
          </div>
        </div>
      `).join('');
    }

    function renderAgentOptions() {
      const el = document.getElementById('agent-select');
      el.innerHTML = agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    }

    function renderRunnerOptions() {
      const el = document.getElementById('runner-select');
      el.innerHTML = '<option value="">None (auto-assign)</option>' + 
        runners.map(r => `<option value="${r.runner_id}">${r.runner_id}</option>`).join('');
    }

    function showNewSession() {
      document.getElementById('new-session-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('new-session-modal').classList.remove('active');
    }

    async function createSession() {
      const agentId = document.getElementById('agent-select').value;
      const title = document.getElementById('session-title').value;
      const runnerId = document.getElementById('runner-select').value;

      const body = { agent_id: agentId, title };
      if (runnerId) body.runner_id = runnerId;

      const session = await api('/v1/sessions', {
        method: 'POST',
        body: JSON.stringify(body),
      });

      closeModal();
      document.getElementById('session-title').value = '';
      await refresh();
      openSession(session.id);
    }

    async function assignRunner(runnerId) {
      if (!currentSession) return;
      
      await api(`/v1/sessions/${currentSession.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ runner_id: runnerId || null }),
      });
      
      await refresh();
      openSession(currentSession.id);
    }

    async function openSession(id) {
      currentSession = await api(`/v1/sessions/${id}`);
      
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-input').style.display = 'flex';
      
      document.getElementById('chat-title').textContent = currentSession.title || currentSession.id;
      const agent = agents.find(a => a.id === currentSession.agent_id);
      document.getElementById('chat-agent').textContent = agent ? agent.name : currentSession.agent_id;
      
      // Populate runner dropdown
      const runnerSelect = document.getElementById('assign-runner-select');
      runnerSelect.innerHTML = '<option value="">No runner</option>' + 
        runners.map(r => `<option value="${r.runner_id}" ${currentSession.runner_id === r.runner_id ? 'selected' : ''}>${r.runner_id}</option>`).join('');
      
      // Update runner status
      const runner = runners.find(r => r.runner_id === currentSession.runner_id);
      document.getElementById('runner-dot').className = 'status-dot ' + (runner ? 'status-online' : 'status-offline');
      
      const messages = await api(`/v1/sessions/${id}/messages`);
      renderMessages(messages);
      renderSessions();
    }

    function renderMessages(messages) {
      const el = document.getElementById('messages');
      if (!messages.length) {
        el.innerHTML = '<div class="message message-system">No messages yet. Type below to start.</div>';
        return;
      }
      el.innerHTML = messages.map(m => `
        <div class="message message-${m.role}">${escapeHtml(m.content)}</div>
      `).join('');
      el.scrollTop = el.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      if (!content || !currentSession) return;

      input.value = '';

      const messagesEl = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message message-user';
      msgDiv.textContent = content;
      messagesEl.appendChild(msgDiv);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      await api(`/v1/sessions/${currentSession.id}/messages`, {
        method: 'POST',
        body: JSON.stringify({ content, role: 'user' }),
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Auto-refresh runners every 5 seconds
    setInterval(async () => {
      try {
        runners = await api('/v1/runners');
        renderRunners();
        renderRunnerOptions();
      } catch {}
    }, 5000);

    refresh();
  </script>
</body>
</html>
