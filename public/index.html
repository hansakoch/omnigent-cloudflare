<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnigent Cloud</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #222;
      margin-bottom: 20px;
    }
    h1 { font-size: 20px; color: #fff; }
    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-secondary { background: #333; color: white; }
    .btn-secondary:hover { background: #444; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-danger:hover { background: #b91c1c; }

    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; height: calc(100vh - 100px); }
    @media (max-width: 768px) { .layout { grid-template-columns: 1fr; height: auto; } }

    .panel {
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-content { flex: 1; overflow-y: auto; padding: 8px; }

    .session-item {
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: background 0.1s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .session-item:hover { background: #1a1a1a; }
    .session-item.active { background: #1e3a5f; }
    .session-title { font-size: 14px; flex: 1; }
    .session-meta { font-size: 11px; color: #666; margin-top: 2px; }

    .chat-panel { display: flex; flex-direction: column; }
    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 { font-size: 15px; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; }
    .message {
      padding: 10px 14px;
      margin-bottom: 8px;
      border-radius: 8px;
      max-width: 80%;
      line-height: 1.5;
      font-size: 14px;
    }
    .message-user { background: #1e3a5f; margin-left: auto; }
    .message-assistant { background: #1a1a1a; border: 1px solid #222; }
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid #222;
    }
    .chat-input input { flex: 1; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .status-online { background: #22c55e; }
    .status-offline { background: #ef4444; }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
    }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 4px; color: #888; font-size: 13px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 8px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: white;
      font-size: 14px;
    }

    .empty { color: #666; text-align: center; padding: 40px 20px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Omnigent Cloud</h1>
      <div>
        <button class="btn btn-secondary" onclick="refresh()">Refresh</button>
        <button class="btn btn-primary" onclick="showNewSession()">New Session</button>
      </div>
    </header>

    <div class="layout">
      <div class="panel">
        <div class="panel-header">
          <span>Sessions</span>
          <span id="session-count">0</span>
        </div>
        <div class="panel-content" id="sessions-list">
          <div class="empty">No sessions yet</div>
        </div>
      </div>

      <div class="panel chat-panel">
        <div class="chat-header" id="chat-header" style="display: none;">
          <h2 id="chat-title">Session</h2>
          <button class="btn btn-danger" style="font-size: 11px; padding: 4px 8px;" onclick="deleteCurrentSession()">Delete</button>
        </div>
        <div class="chat-messages" id="messages">
          <div class="empty">Select a session to start chatting</div>
        </div>
        <div class="chat-input" id="chat-input" style="display: none;">
          <input type="text" id="message-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="new-session-modal">
    <div class="modal-content">
      <h2 style="margin-bottom: 16px; font-size: 16px;">New Session</h2>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="session-title" placeholder="My session">
      </div>
      <div style="display: flex; gap: 8px; justify-content: flex-end;">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createSession()">Create</button>
      </div>
    </div>
  </div>

  <script>
    const API = window.location.origin;
    let currentSession = null;
    let ws = null;

    // Agent SDK uses /agents/omnigent/:session_id pattern
    function getAgentUrl(sessionId) {
      return `${API}/agents/omnigent/${sessionId}`;
    }

    async function api(path, opts = {}) {
      const res = await fetch(`${API}${path}`, {
        headers: { 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      return res.json();
    }

    async function refresh() {
      // List sessions from D1
      const data = await api('/api/sessions');
      renderSessions(data.data || []);
    }

    function renderSessions(sessions) {
      const el = document.getElementById('sessions-list');
      document.getElementById('session-count').textContent = sessions.length;
      
      if (!sessions.length) {
        el.innerHTML = '<div class="empty">No sessions yet</div>';
        return;
      }
      
      el.innerHTML = sessions.map(s => `
        <div class="session-item ${currentSession?.id === s.id ? 'active' : ''}" onclick="openSession('${s.id}')">
          <div>
            <div class="session-title">${s.title || s.id}</div>
            <div class="session-meta">${s.status}</div>
          </div>
          <button class="btn btn-danger" style="font-size: 10px; padding: 2px 6px;" onclick="event.stopPropagation(); deleteSession('${s.id}')">✕</button>
        </div>
      `).join('');
    }

    function showNewSession() {
      document.getElementById('new-session-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('new-session-modal').classList.remove('active');
    }

    async function createSession() {
      const title = document.getElementById('session-title').value || 'New Session';
      const sessionId = `session-${crypto.randomUUID().slice(0, 8)}`;
      
      // Create session via API
      await api('/api/sessions', {
        method: 'POST',
        body: JSON.stringify({ id: sessionId, title }),
      });
      
      closeModal();
      document.getElementById('session-title').value = '';
      await refresh();
      openSession(sessionId);
    }

    async function openSession(id) {
      // Close existing WebSocket
      if (ws) ws.close();
      
      currentSession = { id };
      
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-input').style.display = 'flex';
      document.getElementById('chat-title').textContent = id;
      
      // Connect via WebSocket to Agent
      const agentUrl = getAgentUrl(id);
      ws = new WebSocket(agentUrl.replace('http', 'ws'));
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        
        if (data.type === 'state') {
          document.getElementById('chat-title').textContent = data.title || id;
        }
        
        if (data.type === 'history') {
          renderMessages(data.messages || []);
        }
        
        if (data.type === 'message') {
          appendMessage(data);
        }
      };
      
      ws.onclose = () => {
        console.log('WebSocket closed');
      };
      
      renderSessions(await (await api('/api/sessions')).data || []);
    }

    function renderMessages(messages) {
      const el = document.getElementById('messages');
      if (!messages.length) {
        el.innerHTML = '<div class="empty">No messages yet</div>';
        return;
      }
      el.innerHTML = messages.map(m => `
        <div class="message message-${m.role}">${escapeHtml(m.content)}</div>
      `).join('');
      el.scrollTop = el.scrollHeight;
    }

    function appendMessage(msg) {
      const el = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message message-${msg.role}`;
      div.textContent = msg.content;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('message-input');
      const content = input.value.trim();
      if (!content || !ws) return;
      
      input.value = '';
      
      // Send via WebSocket
      ws.send(JSON.stringify({
        type: 'message',
        role: 'user',
        content,
      }));
    }

    async function deleteSession(id) {
      if (!confirm('Delete this session?')) return;
      await api(`/api/sessions/${id}`, { method: 'DELETE' });
      if (currentSession?.id === id) {
        currentSession = null;
        if (ws) ws.close();
        document.getElementById('chat-header').style.display = 'none';
        document.getElementById('chat-input').style.display = 'none';
        document.getElementById('messages').innerHTML = '<div class="empty">Select a session to start chatting</div>';
      }
      await refresh();
    }

    async function deleteCurrentSession() {
      if (currentSession) await deleteSession(currentSession.id);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    refresh();
  </script>
</body>
</html>
